<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f0f7ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="服务器管理">
<title>Server Tracker · 服务器管理</title>
<link rel="manifest" href="./manifest.json">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #f0f7ff;
  --bg-2: #ffffff;
  --bg-3: #e0eaf5;
  --bg-4: #c5d6e8;
  --text: #0f172a;
  --text-2: #475569;
  --text-3: #94a3b8;
  --line: #cbd5e1;
  --line-soft: #e2e8f0;
  --accent: #3b82f6;
  --accent-dark: #1e40af;
  --accent-2: #0ea5e9;
  --green: #10b981;
  --warn: #ef4444;
  --orange: #f59e0b;
  --yellow: #fbbf24;
  --purple: #8b5cf6;
  --shadow-sm: 0 1px 3px rgba(15, 23, 42, 0.04), 0 1px 2px rgba(15, 23, 42, 0.06);
  --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.08), 0 2px 4px rgba(15, 23, 42, 0.04);
  --shadow-lg: 0 10px 30px rgba(15, 23, 42, 0.10);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
  background-image: 
    radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
    radial-gradient(circle at 100% 100%, rgba(14, 165, 233, 0.06) 0%, transparent 50%);
}

#app {
  max-width: 480px;
  margin: 0 auto;
  padding: 18px 16px 100px;
}

.header {
  margin-bottom: 18px;
  padding-bottom: 14px;
  border-bottom: 2px solid var(--line-soft);
}
.header h1 {
  font-size: 22px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.02em;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.header h1 .icon {
  font-size: 24px;
  -webkit-text-fill-color: initial;
}
.header .sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-3);
  letter-spacing: 0.05em;
}

.alert-banner {
  background: linear-gradient(135deg, #fef2f2, #fee2e2);
  border: 1px solid #fca5a5;
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
}
.alert-banner.empty {
  background: linear-gradient(135deg, #ecfdf5, #d1fae5);
  border-color: #6ee7b7;
}
.alert-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--warn);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.alert-banner.empty .alert-title { color: var(--green); }

.alert-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.alert-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  background: rgba(255, 255, 255, 0.7);
  border: 1px solid rgba(252, 165, 165, 0.4);
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
}
.alert-item:active { transform: scale(0.99); }
.alert-item:hover { background: white; box-shadow: var(--shadow-sm); }
.alert-item-info { flex: 1; min-width: 0; }
.alert-item-name {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
}
.alert-item-meta {
  font-size: 11px;
  color: var(--text-2);
  margin-top: 1px;
}
.alert-item-status {
  font-size: 11px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 12px;
  flex-shrink: 0;
}
.status-overdue { background: var(--warn); color: white; }
.status-today { background: var(--orange); color: white; }
.status-soon { background: var(--yellow); color: var(--text); }

.summary {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}
.tile {
  background: var(--bg-2);
  border: 1px solid var(--line-soft);
  padding: 14px;
  border-radius: 12px;
  box-shadow: var(--shadow-sm);
}
.tile .label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 4px;
  font-weight: 600;
}
.tile .value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
}
.tile .value.green { color: var(--green); }
.tile .value.blue { color: var(--accent); }
.tile .meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-3);
  margin-top: 2px;
}

.actions {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 16px;
}
.action-btn {
  background: var(--bg-2);
  border: 1px solid var(--line-soft);
  color: var(--text);
  padding: 12px 6px;
  border-radius: 10px;
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  transition: all 0.15s;
  box-shadow: var(--shadow-sm);
}
.action-btn:active { transform: scale(0.97); }
.action-btn:hover { 
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}
.action-btn .icon { font-size: 20px; }

.search-bar {
  position: relative;
  margin-bottom: 14px;
}
.search-bar input {
  width: 100%;
  background: var(--bg-2);
  border: 1px solid var(--line);
  color: var(--text);
  padding: 11px 14px 11px 38px;
  border-radius: 10px;
  font-family: inherit;
  font-size: 13px;
  outline: none;
  box-shadow: var(--shadow-sm);
}
.search-bar input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
}
.search-bar::before {
  content: '🔍';
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
}

.filter-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 14px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 4px;
}
.filter-tabs::-webkit-scrollbar { height: 0; }
.filter-tab {
  background: var(--bg-2);
  border: 1px solid var(--line-soft);
  color: var(--text-2);
  padding: 7px 14px;
  border-radius: 14px;
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}
.filter-tab.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
  font-weight: 600;
  box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
}

.server-group {
  margin-bottom: 18px;
}
.server-group-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 4px 4px 8px;
  margin-bottom: 6px;
  border-bottom: 1px dashed var(--line);
}
.server-group-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--accent-dark);
  letter-spacing: -0.01em;
}
.server-group-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-3);
}

.server-card {
  background: var(--bg-2);
  border: 1px solid var(--line-soft);
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 8px;
  transition: all 0.15s;
  position: relative;
  box-shadow: var(--shadow-sm);
}
.server-card:hover { 
  border-color: var(--accent);
  box-shadow: var(--shadow-md);
}
.server-card.disabled {
  opacity: 0.5;
  background: var(--bg-3);
}
.server-card.disabled::before {
  content: 'INACTIVE';
  position: absolute;
  top: 8px;
  right: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 700;
  color: var(--text-3);
  background: var(--bg);
  padding: 2px 6px;
  border-radius: 3px;
  letter-spacing: 0.1em;
  border: 1px solid var(--line);
}
.server-card.overdue {
  border-color: var(--warn);
  background: linear-gradient(135deg, #fef2f2, white);
  box-shadow: 0 0 0 1px var(--warn), var(--shadow-sm);
}
.server-card.due-soon {
  border-color: var(--orange);
  background: linear-gradient(135deg, #fffbeb, white);
}

.server-ip-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
}
.server-ip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  font-weight: 700;
  color: var(--accent-dark);
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
}
.icon-btn {
  background: var(--bg-3);
  border: 1px solid var(--line-soft);
  color: var(--text-2);
  padding: 5px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-family: inherit;
  font-weight: 500;
  cursor: pointer;
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  gap: 3px;
  transition: all 0.15s;
}
.icon-btn:hover { 
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}
.icon-btn.copied { 
  background: var(--green); 
  color: white;
  border-color: var(--green);
}
.icon-btn.edit-btn:hover {
  background: var(--purple);
  border-color: var(--purple);
}

.server-meta {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  font-size: 12px;
  color: var(--text-2);
  font-family: 'JetBrains Mono', monospace;
  align-items: center;
}
.server-meta .price {
  color: var(--orange);
  font-weight: 600;
}
.server-meta .due-date {
  color: var(--text-2);
}
.server-meta .due-date.overdue { color: var(--warn); font-weight: 700; }
.server-meta .due-date.soon { color: var(--orange); font-weight: 600; }

.quick-action {
  background: var(--bg);
  border: 1px dashed var(--line);
  color: var(--text-3);
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s;
}
.quick-action:hover {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
  border-style: solid;
}

.server-note {
  font-size: 11px;
  color: var(--text-2);
  margin-top: 4px;
  font-style: italic;
}

/* 卡片登录信息 */
.server-login {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 6px;
  padding: 6px 10px;
  background: linear-gradient(135deg, rgba(139, 92, 246, 0.06), rgba(59, 130, 246, 0.03));
  border: 1px solid rgba(139, 92, 246, 0.18);
  border-radius: 6px;
  font-size: 11px;
}
.server-login .login-label {
  font-size: 12px;
}
.server-login .login-user {
  font-family: 'JetBrains Mono', monospace;
  color: var(--purple);
  font-weight: 600;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
  transition: background 0.15s;
}
.server-login .login-user:hover {
  background: rgba(139, 92, 246, 0.15);
}
.server-login .login-port {
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-3);
  font-size: 10px;
}
.server-login .login-pwd-btn {
  background: rgba(139, 92, 246, 0.12);
  border: 1px solid rgba(139, 92, 246, 0.25);
  color: var(--purple);
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-family: inherit;
  cursor: pointer;
  margin-left: auto;
}
.server-login .login-pwd-btn:hover {
  background: var(--purple);
  color: white;
}

.add-ip-to-group {
  background: var(--bg);
  border: 1px dashed var(--line);
  color: var(--text-2);
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  font-size: 12px;
  font-family: inherit;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  margin-top: 4px;
}
.add-ip-to-group:hover {
  background: rgba(59, 130, 246, 0.08);
  color: var(--accent);
  border-color: var(--accent);
  border-style: solid;
}

.fab {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: white;
  border: none;
  border-radius: 50%;
  font-size: 28px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
  z-index: 50;
  transition: all 0.15s;
}
.fab:active { transform: scale(0.92); }
.fab:hover { box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5); }

.btn {
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: white;
  border: none;
  padding: 12px 20px;
  border-radius: 8px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
  transition: all 0.15s;
  box-shadow: 0 2px 8px rgba(59, 130, 246, 0.25);
}
.btn:active { transform: scale(0.98); }
.btn:hover { box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4); }
.btn-ghost {
  background: var(--bg-2);
  color: var(--text);
  border: 1px solid var(--line);
  box-shadow: var(--shadow-sm);
}
.btn-ghost:hover { background: var(--bg-3); box-shadow: var(--shadow-md); }
.btn-danger {
  background: var(--warn);
  color: white;
  box-shadow: 0 2px 8px rgba(239, 68, 68, 0.25);
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.5);
  display: none;
  align-items: flex-end;
  justify-content: center;
  z-index: 100;
  backdrop-filter: blur(4px);
}
.modal.show { display: flex; }
.modal-content {
  background: var(--bg-2);
  width: 100%;
  max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
  padding: 20px 18px 30px;
  border-radius: 16px 16px 0 0;
  box-shadow: 0 -10px 40px rgba(15, 23, 42, 0.2);
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line-soft);
}
.modal-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--accent-dark);
}
.modal-close {
  background: var(--bg-3);
  border: none;
  color: var(--text-2);
  font-size: 18px;
  cursor: pointer;
  padding: 6px 10px;
  border-radius: 6px;
  line-height: 1;
}
.modal-close:hover { background: var(--bg-4); }

.field-label {
  display: block;
  font-size: 11px;
  color: var(--text-2);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-bottom: 6px;
  font-weight: 600;
}
.form-group { margin-bottom: 14px; }
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}

input, select, textarea {
  width: 100%;
  background: var(--bg-2);
  border: 1px solid var(--line);
  color: var(--text);
  padding: 11px 12px;
  font-family: inherit;
  font-size: 14px;
  border-radius: 8px;
  outline: none;
  transition: all 0.15s;
}
input:focus, select:focus, textarea:focus { 
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
}
input[type="number"] { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
input[type="date"] { font-family: 'JetBrains Mono', monospace; }
textarea {
  resize: vertical;
  min-height: 80px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}

.toggle-row { display: flex; gap: 10px; }
.toggle-btn {
  flex: 1;
  background: var(--bg-2);
  border: 1px solid var(--line);
  color: var(--text-2);
  padding: 10px;
  border-radius: 8px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.toggle-btn.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
  font-weight: 600;
  box-shadow: 0 2px 8px rgba(59, 130, 246, 0.25);
}
.toggle-btn.danger.active {
  background: var(--warn);
  border-color: var(--warn);
  box-shadow: 0 2px 8px rgba(239, 68, 68, 0.25);
}

.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: white;
  padding: 11px 20px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s;
  z-index: 1000;
  white-space: nowrap;
  box-shadow: var(--shadow-lg);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-3);
}
.empty .icon { font-size: 56px; margin-bottom: 16px; opacity: 0.5; }
.empty .text { font-size: 14px; line-height: 1.6; }

.hidden { display: none !important; }

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg-3); }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
</style>
</head>
<body>

<div id="app">
  <header class="header">
    <h1><span class="icon">🖥️</span><span>服务器管理</span></h1>
    <div class="sub">// VPS subscriptions &amp; renewal reminder</div>
  </header>

  <div id="alertBanner" class="alert-banner empty">
    <div class="alert-title">
      <span id="alertIcon">✓</span>
      <span id="alertTitle">所有服务器都还远</span>
    </div>
    <div class="alert-list" id="alertList"></div>
  </div>

  <div class="summary">
    <div class="tile">
      <div class="label">月度支出</div>
      <div class="value green" id="monthlyTotal">RM 0</div>
      <div class="meta" id="activeCount">0 active</div>
    </div>
    <div class="tile">
      <div class="label">下次到期</div>
      <div class="value blue" id="nextDue">—</div>
      <div class="meta" id="nextDueName">尚未设置到期日</div>
    </div>
  </div>

  <div class="actions">
    <button class="action-btn" id="importBtn">
      <span class="icon">📥</span>
      <span>导入 txt</span>
    </button>
    <button class="action-btn" id="exportBtn">
      <span class="icon">📤</span>
      <span>导出备份</span>
    </button>
    <button class="action-btn" id="settingsBtn">
      <span class="icon">⚙️</span>
      <span>设置</span>
    </button>
  </div>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="搜索 IP / 供应商 / 备注..." autocomplete="off">
  </div>

  <div class="filter-tabs">
    <button class="filter-tab active" data-filter="all">全部</button>
    <button class="filter-tab" data-filter="active">启用</button>
    <button class="filter-tab" data-filter="overdue">已逾期</button>
    <button class="filter-tab" data-filter="soon">即将到期</button>
    <button class="filter-tab" data-filter="inactive">已停用</button>
  </div>

  <div id="serverList"></div>

  <button class="fab" id="addBtn" title="添加服务器">+</button>
</div>

<div class="modal" id="serverModal">
  <div class="modal-content">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">添加服务器</span>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    
    <div class="form-row">
      <div>
        <label class="field-label">IP 地址</label>
        <input type="text" id="inIp" placeholder="103.68.63.120" autocomplete="off">
      </div>
      <div>
        <label class="field-label">供应商</label>
        <input type="text" id="inProvider" placeholder="Layerstack" autocomplete="off">

<div class="toast" id="toast"></div>

<script>
const DB_NAME = 'serverTrackerDB';
const DB_VERSION = 1;
let db;

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('servers')) {
        const s = d.createObjectStore('servers', { keyPath: 'id', autoIncrement: true });
        s.createIndex('provider', 'provider');
      }
      if (!d.objectStoreNames.contains('settings')) {
        d.createObjectStore('settings', { keyPath: 'key' });
      }
    };
    req.onsuccess = (e) => { db = e.target.result; res(db); };
    req.onerror = rej;
  });
}

const Data = {
  add(s) {
    return new Promise((res, rej) => {
      const tx = db.transaction('servers', 'readwrite');
      const r = tx.objectStore('servers').add(s);
      r.onsuccess = () => res(r.result);
      r.onerror = rej;
    });
  },
  update(s) {
    return new Promise((res, rej) => {
      const tx = db.transaction('servers', 'readwrite');
      const r = tx.objectStore('servers').put(s);
      r.onsuccess = () => res();
      r.onerror = rej;
    });
  },
  delete(id) {
    return new Promise((res, rej) => {
      const tx = db.transaction('servers', 'readwrite');
      const r = tx.objectStore('servers').delete(id);
      r.onsuccess = () => res();
      r.onerror = rej;
    });
  },
  getAll() {
    return new Promise((res, rej) => {
      const tx = db.transaction('servers', 'readonly');
      const r = tx.objectStore('servers').getAll();
      r.onsuccess = () => res(r.result || []);
      r.onerror = rej;
    });
  },
  setSetting(k, v) {
    return new Promise((res, rej) => {
      const tx = db.transaction('settings', 'readwrite');
      const r = tx.objectStore('settings').put({ key: k, value: v });
      r.onsuccess = () => res();
      r.onerror = rej;
    });
  },
  getSetting(k) {
    return new Promise((res) => {
      const tx = db.transaction('settings', 'readonly');
      const r = tx.objectStore('settings').get(k);
      r.onsuccess = () => res(r.result?.value);
      r.onerror = () => res(null);
    });
  },
  clearAll() {
    return new Promise((res, rej) => {
      const tx = db.transaction('servers', 'readwrite');
      tx.objectStore('servers').clear();
      tx.oncomplete = () => res();
      tx.onerror = rej;
    });
  }
};

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function daysUntil(dateStr) {
  if (!dateStr) return null;
  const target = new Date(dateStr + 'T00:00:00');
  const now = new Date();
  now.setHours(0, 0, 0, 0);
  return Math.round((target - now) / (1000 * 60 * 60 * 24));
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
function addPeriod(dateStr, cycle) {
  const d = new Date(dateStr + 'T00:00:00');
  if (cycle === 'monthly') d.setMonth(d.getMonth() + 1);
  else if (cycle === 'quarterly') d.setMonth(d.getMonth() + 3);
  else if (cycle === 'yearly') d.setFullYear(d.getFullYear() + 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function monthlyPrice(price, cycle) {
  if (!price) return 0;
  if (cycle === 'monthly') return price;
  if (cycle === 'quarterly') return price / 3;
  if (cycle === 'yearly') return price / 12;
  return 0;
}
function formatShortDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

function parseServerListTxt(text) {
  const lines = text.split('\n').map(l => l.trim());
  const servers = [];
  let currentProvider = '';
  
  for (const line of lines) {
    if (!line) continue;
    
    if (line.startsWith('-') || line.startsWith('•') || line.startsWith('*')) {
      const rest = line.replace(/^[-•*]\s*/, '').trim();
      const ipMatch = rest.match(/^([\d.]+|[a-zA-Z0-9.-]+\.[a-zA-Z]{2,})/);
      if (ipMatch) {
        const ip = ipMatch[1];
        const after = rest.slice(ipMatch[0].length).trim();
        let label = '';
        let inactive = false;
        const noteMatch = after.match(/[（(]([^）)]+)[）)]/);
        if (noteMatch) {
          label = noteMatch[1].trim();
          if (/没用了|不用了|用不到|废弃|停用|inactive|disabled|expired/i.test(label)) {
            inactive = true;
          }
        }
        const remaining = after.replace(/[（(][^）)]+[）)]/, '').trim();
        if (remaining && !label.includes(remaining)) {
          label = label ? `${label} · ${remaining}` : remaining;
        }
        if (/没用了|不用了|用不到/i.test(after)) inactive = true;
        
        servers.push({
          provider: currentProvider,
          ip: ip,
          label: label,
          status: inactive ? 'inactive' : 'active',
          price: 0,
          cycle: 'monthly',
          dueDate: '',
          createdAt: Date.now()
        });
      }
    } else {
      let provider = line.replace(/https?:\/\/\S+/g, '').trim();
      provider = provider.replace(/[:：]$/, '').trim();
      if (provider) currentProvider = provider;
    }
  }
  
  return servers;
}

let currentFilter = 'all';
let currentSearch = '';
let editingServerId = null;
let pendingServerStatus = 'active';
let prefilledProvider = '';

async function renderAll() {
  const all = await Data.getAll();
  await renderAlertBanner(all);
  renderSummary(all);
  renderServerList(all);
}

async function renderAlertBanner(all) {
  const reminderDays = (await Data.getSetting('reminderDays')) || 7;
  const banner = document.getElementById('alertBanner');
  const list = document.getElementById('alertList');
  
  const upcoming = all
    .filter(s => s.status !== 'inactive' && s.dueDate)
    .map(s => ({ ...s, days: daysUntil(s.dueDate) }))
    .filter(s => s.days !== null && s.days <= reminderDays)
    .sort((a, b) => a.days - b.days);
  
  if (upcoming.length === 0) {
    banner.classList.add('empty');
    document.getElementById('alertIcon').textContent = '✓';
    document.getElementById('alertTitle').textContent = '所有服务器都还远';
    list.innerHTML = '';
    return;
  }
  
  banner.classList.remove('empty');
  document.getElementById('alertIcon').textContent = '⚠️';
  document.getElementById('alertTitle').textContent = `即将到期 (${upcoming.length})`;
  
  list.innerHTML = upcoming.map(s => {
    let statusText, statusClass;
    if (s.days < 0) {
      statusText = `逾期 ${Math.abs(s.days)} 天`;
      statusClass = 'status-overdue';
    } else if (s.days === 0) {
      statusText = '今天到期';
      statusClass = 'status-today';
    } else {
      statusText = `${s.days} 天后`;
      statusClass = 'status-soon';
    }
    return `
      <div class="alert-item" data-id="${s.id}">
        <div class="alert-item-info">
          <div class="alert-item-name">${escapeHtml(s.ip)}</div>
          <div class="alert-item-meta">${escapeHtml(s.provider || '—')}${s.label ? ' · ' + escapeHtml(s.label) : ''}${s.price > 0 ? ' · RM ' + s.price : ''}</div>
        </div>
        <div class="alert-item-status ${statusClass}">${statusText}</div>
      </div>
    `;
  }).join('');
  
  list.querySelectorAll('.alert-item').forEach(el => {
    el.addEventListener('click', () => openServerEdit(parseInt(el.dataset.id)));
  });
}

function renderSummary(all) {
  const active = all.filter(s => s.status !== 'inactive');
  const total = active.reduce((sum, s) => sum + monthlyPrice(s.price || 0, s.cycle || 'monthly'), 0);
  document.getElementById('monthlyTotal').textContent = `RM ${total.toFixed(0)}`;
  document.getElementById('activeCount').textContent = `${active.length} active · ${all.length} total`;
  
  const upcoming = active
    .filter(s => s.dueDate)
    .map(s => ({ ...s, days: daysUntil(s.dueDate) }))
    .filter(s => s.days !== null && s.days >= 0)
    .sort((a, b) => a.days - b.days);
  
  if (upcoming.length > 0) {
    const next = upcoming[0];
    document.getElementById('nextDue').textContent = next.days === 0 ? 'TODAY' : `${next.days}d`;
    document.getElementById('nextDueName').textContent = next.ip;
  } else {
    document.getElementById('nextDue').textContent = '—';
    document.getElementById('nextDueName').textContent = '尚未设置到期日';
  }
}

function renderServerList(all) {
  let filtered = all;
  
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    filtered = filtered.filter(s => 
      (s.ip || '').toLowerCase().includes(q) ||
      (s.provider || '').toLowerCase().includes(q) ||
      (s.label || '').toLowerCase().includes(q)
    );
  }
  
  if (currentFilter === 'active') {
    filtered = filtered.filter(s => s.status !== 'inactive');
  } else if (currentFilter === 'inactive') {
    filtered = filtered.filter(s => s.status === 'inactive');
  } else if (currentFilter === 'overdue') {
    filtered = filtered.filter(s => {
      if (s.status === 'inactive' || !s.dueDate) return false;
      return daysUntil(s.dueDate) < 0;
    });
  } else if (currentFilter === 'soon') {
    filtered = filtered.filter(s => {
      if (s.status === 'inactive' || !s.dueDate) return false;
      const d = daysUntil(s.dueDate);
      return d >= 0 && d <= 7;
    });
  }
  
  const container = document.getElementById('serverList');
  
  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <div class="icon">📭</div>
        <div class="text">${all.length === 0 ? '还没有服务器<br>点 + 添加 或 📥 导入 txt' : '没有匹配的'}</div>
      </div>
    `;
    return;
  }
  
  const grouped = {};
  const providerOrder = [];
  filtered.forEach(s => {
    const p = s.provider || '(无供应商)';
    if (!grouped[p]) {
      grouped[p] = [];
      providerOrder.push(p);
    }
    grouped[p].push(s);
  });
  
  container.innerHTML = providerOrder.map(provider => {
    const servers = grouped[provider];
    return `
      <div class="server-group">
        <div class="server-group-header">
          <div class="server-group-name">${escapeHtml(provider)}</div>
          <div class="server-group-count">${servers.length} server${servers.length > 1 ? 's' : ''}</div>
        </div>
        ${servers.map(s => {
          const days = s.dueDate ? daysUntil(s.dueDate) : null;
          let cardClass = '';
          if (s.status === 'inactive') cardClass = 'disabled';
          else if (days !== null && days < 0) cardClass = 'overdue';
          else if (days !== null && days <= 7) cardClass = 'due-soon';
          
          let dueClass = '';
          let dueText = '';
          if (s.dueDate) {
            if (days < 0) {
              dueClass = 'overdue';
              dueText = `⚠ 逾期 ${Math.abs(days)} 天`;
            } else if (days === 0) {
              dueClass = 'overdue';
              dueText = '⚠ 今天到期';
            } else if (days <= 7) {
              dueClass = 'soon';
              dueText = `📅 ${days} 天后 (${formatShortDate(s.dueDate)})`;
            } else {
              dueText = `📅 ${s.dueDate}`;
            }
          }
          
          return `
            <div class="server-card ${cardClass}">
              <div class="server-ip-row">
                <span class="server-ip">${escapeHtml(s.ip)}</span>
                <button class="icon-btn copy-btn" data-ip="${escapeHtml(s.ip)}">📋 copy</button>
                <button class="icon-btn edit-btn" data-id="${s.id}">✎ edit</button>
              </div>
              <div class="server-meta">
                ${s.price > 0 ? `<span class="price">RM ${s.price}/${s.cycle === 'monthly' ? 'mo' : s.cycle === 'quarterly' ? 'qtr' : s.cycle === 'yearly' ? 'yr' : 'once'}</span>` : `<button class="quick-action quick-set-price" data-id="${s.id}">+ 设月费</button>`}
                ${dueText ? `<span class="due-date ${dueClass}">${dueText}</span>` : `<button class="quick-action quick-set-date" data-id="${s.id}">+ 设到期日</button>`}
                ${s.dueDate ? `<button class="quick-action renew-quick" data-id="${s.id}" style="border-color: var(--green); color: var(--green); border-style: solid; background: rgba(16, 185, 129, 0.06);">✓ 已续费</button>` : ''}
              </div>
              ${(s.username || s.password) ? `
                <div class="server-login">
                  <span class="login-label">🔐</span>
                  ${s.username ? `<span class="login-user" data-copy="${escapeHtml(s.username)}" data-label="账号">${escapeHtml(s.username)}</span>` : ''}
                  ${s.port ? `<span class="login-port">:${escapeHtml(s.port)}</span>` : ''}
                  ${s.password ? `<button class="login-pwd-btn" data-id="${s.id}">显示密码</button>` : ''}
                </div>
              ` : ''}
              ${s.label ? `<div class="server-note">${escapeHtml(s.label)}</div>` : ''}
            </div>
          `;
        }).join('')}
        <button class="add-ip-to-group" data-provider="${escapeHtml(provider)}">
          + 添加 IP 到 ${escapeHtml(provider)}
        </button>
      </div>
    `;
  }).join('');
  
  container.querySelectorAll('.edit-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      openServerEdit(parseInt(btn.dataset.id));
    });
  });
  
  container.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const ip = btn.dataset.ip;
      navigator.clipboard.writeText(ip).then(() => {
        btn.textContent = '✓ copied';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = '📋 copy';
          btn.classList.remove('copied');
        }, 1500);
      });
    });
  });
  
  container.querySelectorAll('.quick-set-price').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      await openServerEdit(parseInt(btn.dataset.id));
      setTimeout(() => document.getElementById('inPrice').focus(), 200);
    });
  });
  
  container.querySelectorAll('.quick-set-date').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      await openServerEdit(parseInt(btn.dataset.id));
      setTimeout(() => {
        const dateInput = document.getElementById('inDueDate');
        dateInput.focus();
        if (typeof dateInput.showPicker === 'function') {
          try { dateInput.showPicker(); } catch (e) {}
        }
      }, 200);
    });
  });
  
  container.querySelectorAll('.add-ip-to-group').forEach(btn => {
    btn.addEventListener('click', () => {
      prefilledProvider = btn.dataset.provider;
      openServerEdit(null);
    });
  });
  
  // 卡片快捷续费
  container.querySelectorAll('.renew-quick').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const id = parseInt(btn.dataset.id);
      const all = await Data.getAll();
      const s = all.find(x => x.id === id);
      if (!s || !s.dueDate) return;
      const newDate = addPeriod(s.dueDate, s.cycle || 'monthly');
      s.dueDate = newDate;
      await Data.update(s);
      const cycleLabel = s.cycle === 'monthly' ? '+1月' : s.cycle === 'quarterly' ? '+3月' : s.cycle === 'yearly' ? '+1年' : '';
      showToast(`✓ ${s.ip} 已续费 ${cycleLabel} → ${newDate}`);
      await renderAll();
    });
  });
  
  // 显示密码(临时弹窗)
  container.querySelectorAll('.login-pwd-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const id = parseInt(btn.dataset.id);
      const all = await Data.getAll();
      const s = all.find(x => x.id === id);
      if (!s || !s.password) return;
      // 自动复制密码到剪贴板
      try {
        await navigator.clipboard.writeText(s.password);
      } catch (err) {}
      // 显示密码 4 秒后自动隐藏
      btn.dataset.originalText = btn.textContent;
      btn.textContent = s.password;
      btn.style.background = 'var(--warn)';
      btn.style.color = 'white';
      btn.style.borderColor = 'var(--warn)';
      btn.style.fontFamily = "'JetBrains Mono', monospace";
      showToast('✓ 密码已复制到剪贴板');
      setTimeout(() => {
        btn.textContent = '显示密码';
        btn.style.background = '';
        btn.style.color = '';
        btn.style.borderColor = '';
        btn.style.fontFamily = '';
      }, 4000);
    });
  });
  
  // 点账号复制
  container.querySelectorAll('.login-user').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const val = el.dataset.copy;
      navigator.clipboard.writeText(val).then(() => {
        showToast(`✓ 已复制账号: ${val}`);
      });
    });
  });
}

async function openServerEdit(id = null) {
  editingServerId = id;
  
  // 重置密码可见性 - 每次打开都默认隐藏
  document.getElementById('inPassword').type = 'password';
  document.getElementById('togglePasswordBtn').textContent = '👁️';
  
  if (id) {
    const all = await Data.getAll();
    const s = all.find(x => x.id === id);
    if (!s) return;
    document.getElementById('modalTitle').textContent = '编辑服务器';
    document.getElementById('inIp').value = s.ip || '';
    document.getElementById('inProvider').value = s.provider || '';
    document.getElementById('inLabel').value = s.label || '';
    document.getElementById('inPrice').value = s.price || '';
    document.getElementById('inCycle').value = s.cycle || 'monthly';
    document.getElementById('inDueDate').value = s.dueDate || '';
    document.getElementById('inUsername').value = s.username || '';
    document.getElementById('inPort').value = s.port || '';
    document.getElementById('inPassword').value = s.password || '';
    pendingServerStatus = s.status || 'active';
    document.getElementById('deleteServerBtn').classList.remove('hidden');
    document.getElementById('renewBtn').style.display = s.dueDate ? 'block' : 'none';
    prefilledProvider = '';
  } else {
    document.getElementById('modalTitle').textContent = prefilledProvider ? `添加到 ${prefilledProvider}` : '添加服务器';
    document.getElementById('inIp').value = '';
    document.getElementById('inProvider').value = prefilledProvider || '';
    document.getElementById('inLabel').value = '';
    document.getElementById('inPrice').value = '';
    document.getElementById('inCycle').value = 'monthly';
    document.getElementById('inDueDate').value = '';
    document.getElementById('inUsername').value = '';
    document.getElementById('inPort').value = '';
    document.getElementById('inPassword').value = '';
    pendingServerStatus = 'active';
    document.getElementById('deleteServerBtn').classList.add('hidden');
    document.getElementById('renewBtn').style.display = 'none';
  }
  
  document.querySelectorAll('.toggle-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.status === pendingServerStatus);
  });
  
  document.getElementById('serverModal').classList.add('show');
  
  if (!id) {
    setTimeout(() => document.getElementById('inIp').focus(), 200);
  }
}

// ============= 导出 TXT (原始格式 - 无密码) =============
function downloadTxt(text, filename) {
  // BOM + UTF-8 让 Windows 记事本正确显示中文
  const blob = new Blob(['\uFEFF' + text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

document.getElementById('exportTxtBtn').addEventListener('click', async () => {
  const all = await Data.getAll();
  if (all.length === 0) { showToast('没有数据可导出'); return; }
  
  // 按供应商分组(保留原始添加顺序)
  const grouped = {};
  const providerOrder = [];
  all.forEach(s => {
    const p = s.provider || '(无供应商)';
    if (!grouped[p]) {
      grouped[p] = [];
      providerOrder.push(p);
    }
    grouped[p].push(s);
  });
  
  let txt = '';
  providerOrder.forEach(provider => {
    txt += provider + '\n';
    grouped[provider].forEach(s => {
      let line = '- ' + s.ip;
      const parts = [];
      if (s.label) parts.push(s.label);
      if (s.status === 'inactive') parts.push('没用了');
      if (parts.length > 0) line += '（' + parts.join('·') + '）';
      if (s.dueDate) {
        line += ` // 到期 ${s.dueDate}`;
      }
      if (s.price > 0) {
        const cycleLabel = s.cycle === 'monthly' ? '/月' : s.cycle === 'quarterly' ? '/季' : s.cycle === 'yearly' ? '/年' : '';
        line += ` · RM${s.price}${cycleLabel}`;
      }
      txt += line + '\n';
    });
    txt += '\n';
  });
  
  txt += `\n----- Total: ${all.length} servers · Exported: ${todayStr()} -----\n`;
  
  downloadTxt(txt, `servers_${todayStr()}.txt`);
  showToast('✓ 已导出 TXT (无密码)');
});

// ============= 导出 TXT 完整版 (含账号密码 - ⚠ 敏感) =============
document.getElementById('exportTxtFullBtn').addEventListener('click', async () => {
  const all = await Data.getAll();
  if (all.length === 0) { showToast('没有数据可导出'); return; }
  
  if (!confirm('⚠ 即将导出含密码的 TXT 文件!\n\n导出后请妥善保管(微信发给自己也算泄露)。\n\n继续吗?')) return;
  
  const grouped = {};
  const providerOrder = [];
  all.forEach(s => {
    const p = s.provider || '(无供应商)';
    if (!grouped[p]) {
      grouped[p] = [];
      providerOrder.push(p);
    }
    grouped[p].push(s);
  });
  
  let txt = '============================================\n';
  txt += `  服务器完整清单 (含登录信息)\n`;
  txt += `  导出时间: ${new Date().toLocaleString('zh-CN')}\n`;
  txt += `  共 ${all.length} 台服务器\n`;
  txt += '  ⚠ 此文件包含密码,请妥善保管\n';
  txt += '============================================\n\n';
  
  providerOrder.forEach(provider => {
    txt += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
    txt += `  📦 ${provider} (${grouped[provider].length} 台)\n`;
    txt += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n';
    
    grouped[provider].forEach((s, idx) => {
      txt += `[${idx + 1}] IP: ${s.ip}`;
      if (s.status === 'inactive') txt += '   [⚠ 已停用]';
      txt += '\n';
      
      if (s.label) txt += `    备注: ${s.label}\n`;
      
      if (s.username) {
        let loginLine = `    账号: ${s.username}`;
        if (s.port) loginLine += `  端口: ${s.port}`;
        txt += loginLine + '\n';
      }
      if (s.password) txt += `    密码: ${s.password}\n`;
      
      if (s.price > 0) {
        const cycleLabel = s.cycle === 'monthly' ? '/月' : s.cycle === 'quarterly' ? '/季' : s.cycle === 'yearly' ? '/年' : '/一次性';
        txt += `    费用: RM ${s.price}${cycleLabel}\n`;
      }
      if (s.dueDate) {
        const days = daysUntil(s.dueDate);
        let dueLine = `    到期: ${s.dueDate}`;
        if (days < 0) dueLine += `  [⚠ 已逾期 ${Math.abs(days)} 天]`;
        else if (days === 0) dueLine += `  [⚠ 今天到期]`;
        else if (days <= 7) dueLine += `  [⚠ ${days} 天后]`;
        else dueLine += `  (${days} 天后)`;
        txt += dueLine + '\n';
      }
      
      txt += '\n';
    });
  });
  
  // 末尾统计
  const active = all.filter(s => s.status !== 'inactive');
  const totalMonthly = active.reduce((sum, s) => sum + monthlyPrice(s.price || 0, s.cycle || 'monthly'), 0);
  txt += '============================================\n';
  txt += `  统计: ${active.length} 启用 · ${all.length - active.length} 停用\n`;
  txt += `  月度支出总计: RM ${totalMonthly.toFixed(2)}\n`;
  txt += `  年度支出总计: RM ${(totalMonthly * 12).toFixed(2)}\n`;
  txt += '============================================\n';
  
  downloadTxt(txt, `servers_full_${todayStr()}.txt`);
  showToast('✓ 已导出完整 TXT (含密码)');
});

async function checkAndNotify() {
  if (!('Notification' in window)) return;
  if (Notification.permission !== 'granted') return;
  
  const all = await Data.getAll();
  const reminderDays = (await Data.getSetting('reminderDays')) || 7;
  
  const upcoming = all
    .filter(s => s.status !== 'inactive' && s.dueDate)
    .map(s => ({ ...s, days: daysUntil(s.dueDate) }))
    .filter(s => s.days !== null && s.days <= reminderDays);
  
  const today = todayStr();
  const lastNotifDate = await Data.getSetting('lastNotifDate');
  if (lastNotifDate === today) return;
  
  if (upcoming.length > 0) {
    const overdue = upcoming.filter(s => s.days < 0).length;
    const dueToday = upcoming.filter(s => s.days === 0).length;
    let title = '⚠️ Server Tracker 提醒';
    let body = '';
    if (overdue > 0) body += `${overdue} 台服务器已逾期! `;
    if (dueToday > 0) body += `${dueToday} 台今天到期. `;
    if (!body) body = `${upcoming.length} 台服务器即将到期`;
    
    new Notification(title, { body, icon: './icon-192.png', tag: 'server-tracker-' + today });
    await Data.setSetting('lastNotifDate', today);
  }
}

(async () => {
  await openDB();
  await renderAll();
  
  setTimeout(() => checkAndNotify(), 1500);
  
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
})();
